environment: local

server:
  host: 0.0.0.0
  port: 7700
  mode: local

database:
  url_env: DATABASE_URL
  max_connections: 5

logging:
  level: debug
  format: console

webhook:
  max_attempts: 3
  base_delay_ms: 200
  timeout_seconds: 5

cors:
  allowed_origins: ["*"]

cloud:
  provider: none

rate_limit:
  requests_per_minute: 10000
  burst: 1000

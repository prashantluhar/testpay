version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testpay
      POSTGRES_USER: testpay
      POSTGRES_PASSWORD: testpay
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  testpay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports: ["7700:7700"]
    environment:
      DATABASE_URL: postgres://testpay:testpay@postgres:5432/testpay?sslmode=disable
    volumes:
      - ../../deploy/config/testpay.local.yaml:/etc/testpay/testpay.yaml:ro
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pgdata:

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -race

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/testpay-linux-amd64 ./cmd/testpay
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/testpay-linux-arm64 ./cmd/testpay
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/testpay-darwin-amd64 ./cmd/testpay
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/testpay-darwin-arm64 ./cmd/testpay

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/testpay-linux-amd64
            dist/testpay-linux-arm64
            dist/testpay-darwin-amd64
            dist/testpay-darwin-arm64

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testpay
          POSTGRES_USER: testpay
          POSTGRES_PASSWORD: testpay
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build dashboard (required for go:embed)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -o bin/testpay ./cmd/testpay
      - name: Run all tests with coverage
        env:
          TEST_DATABASE_URL: postgres://testpay:testpay@localhost:5432/testpay?sslmode=disable
        run: |
          go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
      - name: Enforce 90% coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 90) exit 1 }' || \
            (echo "Coverage $COVERAGE% is below 90% threshold" && exit 1)
          echo "Coverage gate passed"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
